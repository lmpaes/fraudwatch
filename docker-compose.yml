services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fraudwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fraudwatch
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fraudwatch
    depends_on:
      db:
        condition: service_healthy
    command: python seed.py
    restart: "no"

volumes:
  pgdata:
